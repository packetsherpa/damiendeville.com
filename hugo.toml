baseURL = "https://damiendeville.com/"
locale = "en-US"
title = "Damien DeVille"
timeZone = "America/New_York"
enableRobotsTXT = true
summaryLength = 36

[params]
  author = "Damien DeVille"
  tagline = "Security, AI, Networks, and Technical Leadership"
  description = "Independent writing on security, artificial intelligence, networking, and technical leadership."
  archiveURL = "https://packetsherpa.github.io/soberboots/"

[permalinks]
  articles = "/articles/:slug/"
  notes = "/notes/:year/:month/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[services.rss]
  limit = 30

[markup.highlight]
  codeFences = true
  guessSyntax = true
  noClasses = false

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[[menus.main]]
  name = "Articles"
  pageRef = "/articles"
  weight = 10

[[menus.main]]
  name = "Notes"
  pageRef = "/notes"
  weight = 20

[[menus.main]]
  name = "Topics"
  pageRef = "/categories"
  weight = 30

[[menus.main]]
  name = "About"
  pageRef = "/about"
  weight = 40
