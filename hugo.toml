baseURL = "https://damiendeville.com/"
locale = "en-US"
title = "Damien DeVille"
timeZone = "America/New_York"
enableRobotsTXT = true
summaryLength = 36

[params]
  author = "Damien DeVille"
  tagline = "Notes on Technology, Life, & Music"
  description = "Independent writing by Damien DeVille on security, artificial intelligence, technical leadership, listening, and live music."

[permalinks]
  technology = "/technology/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[services.rss]
  limit = 30

[markup.highlight]
  codeFences = true
  guessSyntax = true
  noClasses = false

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[[menus.main]]
  name = "Technology Notes"
  pageRef = "/technology"
  weight = 10

[[menus.main]]
  name = "Musical Musings"
  pageRef = "/music"
  weight = 20

[[menus.main]]
  name = "Topics"
  pageRef = "/categories"
  weight = 30

[[menus.main]]
  name = "About"
  pageRef = "/about"
  weight = 40
