<header class="site-header">
  <div class="header-inner">
    <a class="site-identity" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} home">
      <span class="site-name">Damien DeVille</span>
      <span class="site-focus">Notes on Technology, Life, &amp; Music</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
